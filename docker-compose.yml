services:
  db:
    image: mysql:8.0
    container_name: shire_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-shire_corner}
      MYSQL_USER: ${MYSQL_USER:-shire}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-shire_pass}
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      # Данные БД — в именованном Docker-томе (надёжнее, чем bind-mount в папку
      # Windows: файлы нельзя случайно удалить «из-под» работающего mysqld).
      # `docker compose down` данные сохраняет; `docker compose down -v` стирает
      # том, и при следующем старте БД пересоздаётся из docker/init/01_database.sql.
      # Перенести данные на другую машину: docker/snapshot-db.ps1 — он обновляет
      # снимок 01_database.sql, который уезжает вместе с репозиторием.
      - shire_db_data:/var/lib/mysql
      - ./docker/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 30s
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  web:
    build: .
    container_name: shire_web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8080}:80"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-shire_corner}
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    volumes:
      - .:/var/www/html
    # Папки с записью (загрузки фото, логи) лежат в смонтированном с хоста коде,
    # поэтому их владельца задаёт хост, а не Dockerfile. На Linux хост-владелец ≠
    # www-data, и Apache не может туда писать («сервер не разрешает» загрузку фото).
    # Перед стартом Apache (он = root на входе) выставляем владельца и права —
    # так загрузка работает из коробки на любой машине. exec → Apache становится
    # PID 1 и корректно ловит сигналы остановки.
    command: >
      sh -c "mkdir -p /var/www/html/public/uploads /var/www/html/logs &&
      chown -R www-data:www-data /var/www/html/public/uploads /var/www/html/logs &&
      chmod -R 0775 /var/www/html/public/uploads /var/www/html/logs &&
      exec apache2-foreground"
    depends_on:
      db:
        condition: service_healthy

volumes:
  # Именованный том для данных MySQL. Живёт внутри Docker, а не в папке проекта —
  # его не видно в проводнике и нельзя случайно снести. Удаляется только явно
  # через `docker compose down -v`.
  shire_db_data:
