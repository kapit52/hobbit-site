<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600">
  <filter id="noise">
    <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="3"></feTurbulence>
    <feColorMatrix values="0 0 0 0 0.4
                           0 0 0 0 0.3
                           0 0 0 0 0.15
                           0 0 0 0.05 0"></feColorMatrix>
  </filter>
  <rect width="600" height="600" fill="transparent"></rect>
  <rect width="600" height="600" filter="url(#noise)" opacity="0.4"></rect>
</svg>
